<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task Board</title>
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!--HEADER-->
  <header class="app-header">
    <div class="header-left">
      <!-- App title -->
      <h1 class="app-title">📋 My Task Board</h1>
      <!-- Task counter badge — updated dynamically by JS -->
      <span class="task-counter" id="taskCounter">0 tasks</span>
    </div>
    <div class="header-right">
      <!-- Priority filter dropdown — JS listens for changes -->
      <label for="priorityFilter" class="filter-label">Filter by Priority:</label>
      <select id="priorityFilter" class="filter-select">
        <option value="all">All</option>
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
  </header>

<!--MAIN BOARD-->
  <main class="board">

    <!-- Column 1: To Do -->
    <section class="column" id="todo">
      <div class="column-header">
        <h2 class="column-title">📌 To Do</h2>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <!-- Task list — event delegation listener attached here by JS -->
      <ul class="task-list" id="list-todo"></ul>
      <!-- Add Task button for this column -->
      <button class="btn-add" data-column="todo">+ Add Task</button>
    </section>

    <!-- Column 2: In Progress -->
    <section class="column" id="inprogress">
      <div class="column-header">
        <h2 class="column-title">⚙️ In Progress</h2>
        <span class="column-count" id="count-inprogress">0</span>
      </div>
      <ul class="task-list" id="list-inprogress"></ul>
      <button class="btn-add" data-column="inprogress">+ Add Task</button>
    </section>

    <!-- Column 3: Done -->
    <section class="column" id="done">
      <div class="column-header">
        <h2 class="column-title">✅ Done</h2>
        <span class="column-count" id="count-done">0</span>
      </div>
      <ul class="task-list" id="list-done"></ul>
      <button class="btn-add" data-column="done">+ Add Task</button>
      <!-- Clear All button — only in Done column -->
      <button class="btn-clear" id="btnClearDone">🗑 Clear All Done</button>
    </section>

  </main>

  <!--MODAL (hidden by default)-->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="taskModal">
      <h2 class="modal-title" id="modalTitle">Add Task</h2>

      <!-- Hidden field to track which task is being edited (empty = new task) -->
      <input type="hidden" id="editTaskId" value="" />
      <!-- Hidden field to track which column this task belongs to -->
      <input type="hidden" id="editColumnId" value="" />

      <!-- Task Title -->
      <div class="form-group">
        <label for="inputTitle">Title <span class="required">*</span></label>
        <input type="text" id="inputTitle" placeholder="Enter task title..." class="form-input" />
      </div>

      <!-- Task Description -->
      <div class="form-group">
        <label for="inputDesc">Description</label>
        <textarea id="inputDesc" placeholder="Enter description..." class="form-textarea" rows="3"></textarea>
      </div>

      <!-- Priority selector -->
      <div class="form-group">
        <label for="inputPriority">Priority</label>
        <select id="inputPriority" class="form-select">
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>

      <!-- Status dropdown-->
      <div class="form-group">
        <label for="inputStatus">Status</label>
        <select id="inputStatus" class="form-select">
          <option value="todo">📌 To Do</option>
          <option value="inprogress">⚙️ In Progress</option>
          <option value="done">✅ Done</option>
        </select>
      </div>

      <!-- Due Date picker -->
      <div class="form-group">
        <label for="inputDueDate">Due Date</label>
        <input type="date" id="inputDueDate" class="form-input" />
      </div>

      <!-- Modal action buttons -->
      <div class="modal-actions">
        <button class="btn-save" id="btnSave">💾 Save</button>
        <button class="btn-cancel" id="btnCancel">✖ Cancel</button>
      </div>
    </div>
  </div>

  <!-- Link to external JavaScript file — placed at bottom so HTML loads first -->
  <script src="taskmanager.js"></script>

</body>
</html>
